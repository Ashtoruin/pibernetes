---
k3s_version: v1.17.5+k3s1
ansible_user: pi
systemd_dir: /etc/systemd/system
master_ip: "{{ hostvars[groups['master'][0]]['ansible_host'] | default(groups['master'][0]) }}"
extra_server_args: ""
extra_agent_args: ""

broadcast: 10.0.0.0
router: 10.0.0.1
netmask: 255.255.255.0
subnet_size: "/24"
dhcp_start_range: 10.0.0.10
dhcp_end_range: 10.0.0.100
