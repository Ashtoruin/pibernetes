---
k3s_version: v1.18.9+k3s1
systemd_dir: /etc/systemd/system
master_ip: "{{ router }}"
extra_server_args: ""
extra_agent_args: ""

# router settings
dhcp_enabled: true
nat_forwarding_enabled: true
dns_enabled: true
pxe_boot_enabled: true

subnet: 10.0.0.0
subnet_size: "/24"
netmask: 255.255.255.0
router: 10.0.0.1
dhcp_start_range: 10.0.0.20
dhcp_end_range: 10.0.0.100

# PXE Boot Settings
regen_pxe_images: false

serial_numbers:
  workers:
    - 6741c5a8
    - 8c95701d
    - 1847fa77
    - 2e40d4b1
    - ed5c1703
    - fe31d916
    - f5ee6dfb
